services:
  postgres:
    image: postgres:15
    container_name: humanguard-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: humanguard-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - backend_network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/humanguard-backend:${RELEASE_VERSION}
    container_name: humanguard-backend
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - MINIO_ENDPOINT=minio:9000
      - STORAGE_TYPE=${STORAGE_TYPE}
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/humanguard-frontend:${RELEASE_VERSION}
    networks:
      - backend_network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: humanguard-keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - backend_network

  nginx:
    image: nginx:alpine
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    command: >
      /bin/sh -c "envsubst '$$APP_DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - backend_network
    depends_on:
      - backend
      - frontend

  # для получения сертификата от Let's Encrypt, запустить эту команду в терминале:
  # docker compose --profile certbot-init run --rm --service-ports certbot certonly --standalone -d ВАШ_ДОМЕН -m ВАШ_EMAIL --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot-init"]
    ports:
      - "80:80"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - backend_network

volumes:
  pg_data:
  minio_data:
  keycloak_data:
  letsencrypt:
  certbot_www:

networks:
  backend_network:
    driver: bridge
