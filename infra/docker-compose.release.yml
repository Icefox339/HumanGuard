services:
  postgres:
    image: postgres:15
    container_name: humanguard-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: humanguard-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - backend_network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/humanguard-backend:${RELEASE_VERSION}
    container_name: humanguard-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - FRONTEND_URL=${FRONTEND_URL}

      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - KEYCLOAK_REDIRECT_URL=${KEYCLOAK_REDIRECT_URL}
      - KEYCLOAK_REDIRECT_AUTH_URL=${KEYCLOAK_REDIRECT_AUTH_URL}
      - KEYCLOAK_TOKEN_URL=${KEYCLOAK_TOKEN_URL}
      - KEYCLOAK_INFO_URL=${KEYCLOAK_INFO_URL}

      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OAUTH_GOOGLE_REDIRECT_URL=${OAUTH_GOOGLE_REDIRECT_URL}

      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - OAUTH_GITHUB_REDIRECT_URL=${OAUTH_GITHUB_REDIRECT_URL}
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/humanguard-frontend:${RELEASE_VERSION}
    restart: unless-stopped
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
      - PROJECT_VERSION=${RELEASE_VERSION}
    networks:
      - backend_network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: humanguard-keycloak
    restart: unless-stopped
    command: start
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      # База данных
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      # Прокси и хостнейм
      - KC_HOSTNAME=${APP_DOMAIN}
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/kc
      - KC_HOSTNAME_URL=https://${APP_DOMAIN}/kc
      - KC_HOSTNAME_ADMIN_URL=https://${APP_DOMAIN}/kc
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    command: >
      /bin/sh -c "envsubst '$$APP_DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - backend_network
    depends_on:
      - backend
      - frontend

  # для получения сертификата от Let's Encrypt, запустить эту команду в терминале:
  # docker compose --profile certbot-init run --rm --service-ports certbot certonly --standalone -d ВАШ_ДОМЕН -m ВАШ_EMAIL --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot-init"]
    ports:
      - "80:80"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - backend_network

volumes:
  pg_data:
  minio_data:
  keycloak_data:
  letsencrypt:
  certbot_www:

networks:
  backend_network:
    driver: bridge
