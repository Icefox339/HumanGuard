services:
  postgres:
    image: postgres:15
    container_name: humanguard-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d humanguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    #image: backend-image:latest
    build: ../backend
    container_name: humanguard-backend
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/humanguard?sslmode=disable
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ../frontend
    networks:
      - backend_network

  nginx:
    image: nginx:alpine
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    command: >
      /bin/sh -c "envsubst '$$APP_DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - backend_network
    depends_on:
      - backend
      - frontend

  # для получения сертификата от Let's Encrypt, запустить эту команду в терминале:
  # docker compose --profile certbot-init run --rm --service-ports certbot certonly --standalone -d ВАШ_ДОМЕН -m ВАШ_EMAIL --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot-init"]
    ports:
      - "80:80"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - backend_network

volumes:
  pg_data:
  letsencrypt:
  certbot_www:

networks:
  backend_network:
    driver: bridge
