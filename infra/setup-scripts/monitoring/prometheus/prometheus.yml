# monitoring/prometheus/prometheus.yml
global:
  scrape_interval: 15s # Интервал сбора метрик

scrape_configs:
  - job_name: 'node_exporter' # Название задачи
    static_configs:
      - targets: ['node-exporter:9100'] # Адрес нашего Node Exporter
      
  - job_name: 'humanguard-backend'
    static_configs:
      - targets: ['humanguard-backend:8000']
