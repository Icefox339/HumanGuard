<text x="385" y="1280" text-anchor="middle" class="legend-title">Легенда потоков</text>
<text x="110" y="1322" class="legend-text">F1–F2: действия пользователя в UI и API-запросы</text>
<text x="110" y="1346" class="legend-text">F3–F4: действия посетителя и отправка check/behavior</text>
<text x="110" y="1370" class="legend-text">F5–F9: маршрутизация Nginx к функциям backend</text>
<text x="110" y="1394" class="legend-text">F10–F14: чтение/запись данных в DB и session store</text>
<text x="110" y="1418" class="legend-text">F15–F18: анализ поведения и расчёт risk score</text>
<text x="110" y="1442" class="legend-text">F19–F20: CAPTCHA/решение allow-captcha-block</text>
<text x="110" y="1466" class="legend-text">F21–F22: файлы: metadata + объектное хранилище</text>
<text x="110" y="1490" class="legend-text">F23–F24: OAuth и экспорт метрик</text>
