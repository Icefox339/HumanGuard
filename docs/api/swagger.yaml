openapi: 3.0.0
info:
  title: HumanGuard API
  version: 1.0.0
servers:
  - url: http://localhost:8080

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: OK
  /api/csrf:
    get:
      summary: Get CSRF token
      responses:
        '200':
          description: OK
  /api/users:
    post:
      summary: Register user
      responses:
        '201':
          description: Created
    get:
      summary: List users (admin)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
  /api/login:
    post:
      summary: Login
      responses:
        '200':
          description: OK
  /api/logout:
    post:
      summary: Logout
      security:
        - BearerAuth: []
      responses:
        '204':
          description: No content
  /api/me:
    get:
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
  /api/users/{id}:
    get:
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    put:
      summary: Update user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Delete user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/users/email/{email}:
    get:
      summary: Find user by email
      security:
        - BearerAuth: []
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/users/exists:
    get:
      summary: Check email exists
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/users/oauth/{provider}/{oauthId}:
    get:
      summary: Find user by OAuth
      security:
        - BearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: oauthId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/users/{id}/password:
    post:
      summary: Change password
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/users/{id}/avatar:
    post:
      summary: Update avatar
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/auth/keycloak/login:
    get:
      summary: Keycloak OAuth login
      responses:
        '302':
          description: Redirect
  /api/auth/keycloak/callback:
    get:
      summary: Keycloak OAuth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect
  /api/auth/google/login:
    get:
      summary: Google OAuth login
      responses:
        '302':
          description: Redirect
  /api/auth/google/callback:
    get:
      summary: Google OAuth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect
  /api/auth/github/login:
    get:
      summary: GitHub OAuth login
      responses:
        '302':
          description: Redirect
  /api/auth/github/callback:
    get:
      summary: GitHub OAuth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect
  /api/sites:
    get:
      summary: List sites
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create site
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Created
  /api/sites/{id}:
    get:
      summary: Get site
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    put:
      summary: Update site
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Delete site
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/sites/{id}/activate:
    post:
      summary: Activate site
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/sites/{id}/suspend:
    post:
      summary: Suspend site
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/sites/{id}/settings:
    get:
      summary: Get site settings
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    put:
      summary: Update site settings
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/sites/{id}/blacklist:
    get:
      summary: Get blacklist
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: Add IP to blacklist
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
  /api/sites/{id}/blacklist/{ip}:
    delete:
      summary: Remove IP from blacklist
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: ip
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/check:
    post:
      summary: Check visitor session
      parameters:
        - name: X-Site-ID
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/behavior/{id}:
    post:
      summary: Submit behavior metrics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted
  /api/sessions/{id}/analyze:
    post:
      summary: Trigger session analysis
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/sites/{id}/sessions:
    get:
      summary: Get site sessions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/sites/{id}/sessions/suspicious:
    get:
      summary: Get suspicious sessions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/sites/{id}/stats:
    get:
      summary: Get session stats
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/keys:
    get:
      summary: List API keys
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create API key
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Created
  /api/keys/{id}:
    delete:
      summary: Revoke API key
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/keys/{id}/permanent:
    delete:
      summary: Delete API key permanently (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/admin/keys:
    get:
      summary: List all API keys (admin)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
  /api/admin/users/sessions:
    get:
      summary: List all user sessions (admin)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
  /api/admin/users/sessions/stats:
    get:
      summary: Get session stats (admin)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
  /api/admin/users/sessions/{session_id}:
    delete:
      summary: Force revoke session (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/files:
    get:
      summary: List files
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
  /api/files/upload:
    post:
      summary: Upload file
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Created
  /api/files/upload/progress:
    get:
      summary: Upload progress WebSocket
      security:
        - BearerAuth: []
      responses:
        '101':
          description: Switching Protocols
  /api/files/{id}:
    get:
      summary: Download file
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Delete file
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/files/share:
    post:
      summary: Create shareable link
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
  /api/files/share/{token}:
    get:
      summary: Download via share token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer