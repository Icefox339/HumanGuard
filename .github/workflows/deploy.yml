name: Deploy distribution

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to deploy
        required: true
        type: string

permissions:
  contents: read

env:
  REPOSITORY: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Remote deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            wget "https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/humanguard-${{ inputs.tag }}.tar.gz"
            tar -xzf "humanguard-${{ inputs.tag }}.tar.gz"
            rm -f "humanguard-${{ inputs.tag }}.tar.gz"
            rm -rf "humanguard"
            mv "humanguard-${{ inputs.tag }}" "humanguard"
            cd "humanguard"

            project_name="humanguard"
            letsencrypt_volume="${project_name}_letsencrypt"
            app_domain="${{ vars.APP_DOMAIN }}"

            cat > .env <<EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            KEYCLOAK_ADMIN=${{ secrets.KEYCLOAK_ADMIN }}
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
            APP_DOMAIN=${app_domain}
            EOF
            chmod 600 .env

            if docker volume inspect "${letsencrypt_volume}" >/dev/null 2>&1; then
              echo "Lets Encrypt volume ${letsencrypt_volume} already exists; reusing existing certificate."
            else
              echo "Lets Encrypt volume ${letsencrypt_volume} is missing; issuing initial certificate."
              docker compose -p "${project_name}" --profile certbot-init run --rm --service-ports certbot certonly --standalone -d "${app_domain}" -m "${{ secrets.LETSENCRYPT_EMAIL }}" --agree-tos --no-eff-email
            fi

            docker compose -p "${project_name}" -f docker-compose.yml pull
            docker compose -p "${project_name}" -f docker-compose.yml up -d --remove-orphans
            docker image prune -f
            