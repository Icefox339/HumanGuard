name: CI pipeline

on:
  push:
    branches:
      - master
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install backend dependencies
        working-directory: backend
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run Go linters
        id: go_lint
        continue-on-error: true
        working-directory: backend
        run: $(go env GOPATH)/bin/golangci-lint run ./...

      - name: Run frontend linters
        id: frontend_lint
        continue-on-error: true
        working-directory: frontend
        run: npm run lint

      - name: Run frontend type check
        id: frontend_typecheck
        continue-on-error: true
        working-directory: frontend
        run: npm run typecheck

      - name: Run SAST scan with Semgrep
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            semgrep/semgrep:latest \
            semgrep scan \
            --config p/default \
            --error \
            --metrics=off \
            --exclude frontend/node_modules \
            --exclude frontend/dist \
            --exclude backend/migrations \
            /src

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build backend image
        run: docker build -t humanguard-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t humanguard-frontend:ci ./frontend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: humanguard-backend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: humanguard-frontend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Fail job if lint checks failed
        if: always()
        run: |
          if [[ "${{ steps.go_lint.outcome }}" == "failure" || \
                "${{ steps.frontend_lint.outcome }}" == "failure" || \
                "${{ steps.frontend_typecheck.outcome }}" == "failure" ]]; then
            exit 1
          fi
