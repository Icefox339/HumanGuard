name: Release distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/humanguard-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/humanguard-frontend

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

      - name: Prepare release bundle
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          bundle_root="dist/humanguard-${version}"

          mkdir -p "${bundle_root}/backend/migrations" "${bundle_root}/nginx"
          cp -R backend/migrations/. "${bundle_root}/backend/migrations/"
          cp infra/nginx/nginx.conf "${bundle_root}/nginx/nginx.conf"
          cp docs/4_DEPLOY.md "${bundle_root}/DEPLOY.md"

          # Require repository-provided files; fail early if missing
          if [ -f .env.example ]; then
            cp .env.example "${bundle_root}/.env.example"
          else
            echo "Required file .env.example not found in repository" >&2
            exit 1
          fi

          if [ -f infra/docker-compose.yml ]; then
            cp infra/docker-compose.yml "${bundle_root}/docker-compose.yml"
          else
            echo "Required file infra/docker-compose.yml not found in repository" >&2
            exit 1
          fi

          tar -czf "dist/humanguard-${version}.tar.gz" -C dist "humanguard-${version}"
          sha256sum "dist/humanguard-${version}.tar.gz" > "dist/humanguard-${version}.tar.gz.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/humanguard-${{ steps.version.outputs.tag }}.tar.gz
            dist/humanguard-${{ steps.version.outputs.tag }}.tar.gz.sha256
